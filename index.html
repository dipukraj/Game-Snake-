<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game</title>

  <link rel="icon" type="image/jpg" href="/image/snake game icon.jpg">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body {
      font-family: 'Arial', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      margin: 10px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 0;
    }

    h1 {
      margin-bottom: 20px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      font-size: 2.5em;
    }

    #score {
      font-size: 1.5em;
      font-weight: bold;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
      margin-bottom: 10px;
    }

    #gameContainer {
      position: relative;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
      background: #222;
      padding: 10px;
    }

    #gameCanvas {
      display: block;
      border-radius: 10px;
    }

    #restartButton {
      margin-top: 20px;
      padding: 10px 20px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1.2em;
      transition: background 0.3s;
    }

    #restartButton:hover {
      background: #45a049;
    }

    #instructions {
      margin-top: 10px;
      text-align: center;
      font-size: 1em;
      opacity: 0.8;
    }



    footer {
      text-align: center;
      margin-top: 40px;
      margin-bottom: 0px;
      padding: 0px;
      color: #efecf3;
      font-size: 14px;
      user-select: none;
    }

    body.dark-mode footer {
      color: #999;
    }

    /* Social Media Box */
    .social-box {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 15px;
      padding: 20px;
      margin: 20px auto;
      max-width: 400px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }

    .social-box h4 {
      margin-bottom: 10px;
      margin-top: 0;
      font-size: 16px;
      color: #fff;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.3);
    }

    .social-box .social-icons {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      margin-top: 20px;
    }

    footer .social-icons a {
      margin: 0 10px;
      text-decoration: none;
      color: #ffffff; /* White color by default */
      font-size: 22px;
      transition: all 0.3s ease;
      display: inline-block;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid transparent;
    }

    footer .social-icons a:hover {
      transform: scale(1.1);
      border-color: rgba(255, 255, 255, 0.3);
    }

    /* Brand Colors for Social Media - Only on Hover */
    footer .social-icons a[aria-label="Twitter"]:hover {
      color: #1DA1F2; /* Twitter Blue */
      background: rgba(29, 161, 242, 0.1);
      border-color: rgba(29, 161, 242, 0.3);
    }

    footer .social-icons a[aria-label="LinkedIn"]:hover {
      color: #0077B5; /* LinkedIn Blue */
      background: rgba(0, 119, 181, 0.1);
      border-color: rgba(0, 119, 181, 0.3);
    }

    footer .social-icons a[aria-label="GitHub"]:hover {
      color: #333333; /* GitHub Black */
      background: rgba(51, 51, 51, 0.1);
      border-color: rgba(51, 51, 51, 0.3);
    }

    footer .social-icons a[aria-label="Website"]:hover {
      color: #4CAF50; /* Website Green */
      background: rgba(76, 175, 80, 0.1);
      border-color: rgba(76, 175, 80, 0.3);
    }

    footer .social-icons a[aria-label="Instagram"]:hover {
      color: #8a3ab9; /* Instagram Purple */
      background: rgba(138, 58, 185, 0.1);
      border-color: rgba(138, 58, 185, 0.3);
    }

    footer .social-icons a:hover {
      color: #f9f8f5;
      transform: scale(1.1);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    /* Fallback for when Font Awesome doesn't load */
    footer .social-icons a::before {
      font-family: Arial, sans-serif;
      font-weight: bold;
    }

    footer .social-icons a[aria-label="Twitter"]::before {
      content: "T";
    }

    footer .social-icons a[aria-label="LinkedIn"]::before {
      content: "in";
    }

    footer .social-icons a[aria-label="GitHub"]::before {
      content: "Git";
    }

    footer .social-icons a[aria-label="Website"]::before {
      content: "🌐";
    }

    footer .social-icons a[aria-label="Instagram"]::before {
      content: "IG";
    }

    /* Hide fallback when Font Awesome loads */
    footer .social-icons a i {
      display: inline-block;
    }

    footer .social-icons a:has(i)::before {
      display: none;
    }

    /* Mobile Control Buttons */
    .control-btn {
      width: 50px;
      height: 50px;
      font-size: 20px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    .control-btn:hover {
      background: #45a049;
      transform: scale(1.05);
    }

    .control-btn:active {
      background: #3d8b40;
      transform: scale(0.95);
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      #mobileControls {
        display: block !important;
      }
      
      #instructions {
        font-size: 0.9em;
      }
      
      h1 {
        font-size: 2em;
      }
      
      canvas {
        max-width: 100%;
        height: auto;
      }
    }
  </style>
</head>

<body>
  <h1>Snake Game</h1>
  <div id="score">Score: 0</div>
  <div id="performanceRank" style="margin-left: 20px; font-size: 1.2em; font-weight: bold; color: #FFD700; display: none;"></div>
  <div id="gameContainer">
    <canvas id="gameCanvas" width="400" height="400"></canvas>
  </div>
  <button id="restartButton">Restart Game</button>
  <div id="instructions">
    Use arrow keys to move the snake. Eat the red food to grow and increase your score. Avoid walls and yourself!
  </div>

  <!-- Mobile Controls -->
  <div id="mobileControls" style="display: none; margin-top: 20px;">
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; width: 150px; margin: 0 auto;">
      <div></div>
      <button class="control-btn" data-direction="up">↑</button>
      <div></div>
      <button class="control-btn" data-direction="left">←</button>
      <div></div>
      <button class="control-btn" data-direction="right">→</button>
      <div></div>
      <button class="control-btn" data-direction="down">↓</button>
      <div></div>
    </div>
  </div>

  <footer>
    <div class="social-box">
      <h4>Developed with ✨Sukoon by Dipu K Raj ❤️</h4>
      <p style="margin: 5px 0;">&copy;2025 | All Rights Reserved.</p>
      <div class="social-icons">
        <a href="https://www.twitter.com/@DipuKRaj" target="_blank" rel="noopener noreferrer" aria-label="Twitter">
          <i class="fab fa-twitter"></i>
        </a>
        <a href="https://www.linkedin.com/in/dipukraj" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
          <i class="fab fa-linkedin"></i>
        </a>
        <a href="https://github.com/dipukraj" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
          <i class="fab fa-github"></i>
        </a>
        <a href="https://dipukraj.me" target="_blank" rel="noopener noreferrer" aria-label="Website">
          <i class="fas fa-globe"></i>
        </a>
        <a href="https://www.instagram.com/r.p.dipu" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
          <i class="fab fa-instagram"></i>
        </a>
      </div>
    </div>
  </footer>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const performanceRankElement = document.getElementById('performanceRank');
    const restartButton = document.getElementById('restartButton');

    canvas.width = 400;
    canvas.height = 400;

    let snake = [{ x: 200, y: 200 }];
    let direction = { x: 10, y: 0 };
    let food = { x: Math.floor(Math.random() * 40) * 10, y: Math.floor(Math.random() * 40) * 10 };
    let score = 0;
    let gameRunning = true;
    let celebrationActive = false;

    // Web Audio API for sounds
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();

    // Celebration particles array
    let particles = [];
    
    // Particle class for celebration effect
    class Particle {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 4;
        this.vy = (Math.random() - 0.5) * 4 - 2;
        this.life = 1.0;
        this.decay = 0.01;
        this.size = Math.random() * 3 + 2;
        this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.1; // gravity
        this.life -= this.decay;
      }

      draw(ctx) {
        ctx.save();
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function createCelebration() {
      // Create particles from center of canvas
      for (let i = 0; i < 50; i++) {
        particles.push(new Particle(canvas.width / 2, canvas.height / 2));
      }
      celebrationActive = true;
      
      // Play celebration sound
      playCelebrationSound();
    }

    function playCelebrationSound() {
      // Play ascending tones for celebration
      setTimeout(() => playBeep(523, 150), 0);   // C
      setTimeout(() => playBeep(659, 150), 100); // E
      setTimeout(() => playBeep(784, 150), 200); // G
      setTimeout(() => playBeep(1047, 300), 300); // High C
    }

    function drawCelebration() {
      // Update and draw particles
      particles = particles.filter(particle => particle.life > 0);
      
      particles.forEach(particle => {
        particle.update();
        particle.draw(ctx);
      });

      // Draw celebration text
      if (celebrationActive && particles.length > 0) {
        ctx.save();
        ctx.font = 'bold 30px Arial';
        ctx.textAlign = 'center';
        ctx.fillStyle = '#FFD700'; // Gold color
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#FFD700';
        
        // Animated text
        const time = Date.now() / 1000;
        const scale = 1 + Math.sin(time * 5) * 0.1;
        ctx.translate(canvas.width / 2, 50);
        ctx.scale(scale, scale);
        ctx.fillText('🎉 AWESOME! 🎉', 0, 0);
        ctx.restore();
      } else {
        celebrationActive = false;
      }
    }

    function playBeep(frequency = 800, duration = 200, type = 'sine') {
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();
      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
      oscillator.frequency.value = frequency;
      oscillator.type = type;
      gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
      oscillator.start(audioContext.currentTime);
      oscillator.stop(audioContext.currentTime + duration / 1000);
    }

    function playGameOverSound() {
      // Descending tones for game over
      setTimeout(() => playBeep(500, 300), 0);
      setTimeout(() => playBeep(400, 300), 200);
      setTimeout(() => playBeep(300, 500), 400);
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Draw snake
      ctx.fillStyle = '#00FF00'; // Bright green
      for (let segment of snake) {
        ctx.fillRect(segment.x, segment.y, 10, 10);
      }

      // Draw food
      ctx.fillStyle = '#FF0000'; // Red
      ctx.beginPath();
      ctx.arc(food.x + 5, food.y + 5, 5, 0, 2 * Math.PI);
      ctx.fill();

      // Draw border
      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = 2;
      ctx.strokeRect(0, 0, canvas.width, canvas.height);

      // Draw celebration effects on top
      if (celebrationActive || particles.length > 0) {
        drawCelebration();
      }
    }

    function update() {
      if (!gameRunning) return;

      // Move snake
      const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };
      snake.unshift(head);

      // Check food collision
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreElement.textContent = 'Score: ' + score;
        food = { x: Math.floor(Math.random() * 40) * 10, y: Math.floor(Math.random() * 40) * 10 };
        playBeep(); // Play eat sound
        
        // Update performance rank display
        updatePerformanceRank(score);
        
        // Check for 100+ score celebration
        if (score >= 100 && score % 100 === 0) {
          createCelebration();
        }
      } else {
        snake.pop();
      }

      // Check wall collision
      if (head.x < 0 || head.x >= canvas.width || head.y < 0 || head.y >= canvas.height) {
        gameOver();
      }

      // Check self collision
      for (let i = 1; i < snake.length; i++) {
        if (head.x === snake[i].x && head.y === snake[i].y) {
          gameOver();
        }
      }
    }

    function updatePerformanceRank(currentScore) {
      const performance = getPerformanceMessage(currentScore);
      performanceRankElement.textContent = performance.text;
      performanceRankElement.style.color = performance.color;
      performanceRankElement.style.display = 'inline';
    }

    function getPerformanceMessage(finalScore) {
      console.log("getPerformanceMessage called with score:", finalScore);
      
      if (finalScore >= 500) {
        return { text: "🏆 LEGENDARY! 🏆", color: "#FFD700" };
      } else if (finalScore >= 300) {
        return { text: "🌟 EXCELLENT! 🌟", color: "#FF6B6B" };
      } else if (finalScore >= 200) {
        return { text: "🎯 VERY GOOD! 🎯", color: "#4ECDC4" };
      } else if (finalScore >= 100) {
        return { text: "👍 GOOD! 👍", color: "#95E77E" };
      } else if (finalScore >= 50) {
        return { text: "💪 NICE TRY! 💪", color: "#FFE66D" };
      } else {
        return { text: "🎮 KEEP PRACTICING! 🎮", color: "#A8DADC" };
      }
    }

    function gameOver() {
      gameRunning = false;
      playGameOverSound(); // Play game over sound
      ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Debug: Log the score
      console.log("Game Over - Final Score:", score);
      
      // Get performance message
      const performance = getPerformanceMessage(score);
      console.log("Performance Message:", performance);
      
      // Draw "Game Over" text
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '30px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('Game Over', canvas.width / 2, canvas.height / 2 - 60);
      
      // Draw performance message with animation
      ctx.save();
      ctx.font = 'bold 25px Arial';
      ctx.fillStyle = performance.color;
      ctx.shadowBlur = 15;
      ctx.shadowColor = performance.color;
      ctx.fillText(performance.text, canvas.width / 2, canvas.height / 2 - 20);
      ctx.restore();
      
      // Draw final score
      ctx.fillStyle = '#FFFFFF';
      ctx.font = '20px Arial';
      ctx.fillText('Final Score: ' + score, canvas.width / 2, canvas.height / 2 + 20);
      
      // Draw motivational message
      ctx.font = '16px Arial';
      ctx.fillStyle = '#CCCCCC';
      if (score >= 100) {
        ctx.fillText('Amazing performance! You rocked it! 🎉', canvas.width / 2, canvas.height / 2 + 50);
      } else if (score >= 50) {
        ctx.fillText('Good job! Keep improving! 📈', canvas.width / 2, canvas.height / 2 + 50);
      } else {
        ctx.fillText('Practice makes perfect! Try again! 💪', canvas.width / 2, canvas.height / 2 + 50);
      }
    }

    function changeDirection(event) {
      const key = event.key;

      // Prevent default behavior for arrow keys to stop page scrolling
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(key)) {
        event.preventDefault();
      }

      if (key === 'ArrowUp' && direction.y === 0) {
        direction = { x: 0, y: -10 };
      } else if (key === 'ArrowDown' && direction.y === 0) {
        direction = { x: 0, y: 10 };
      } else if (key === 'ArrowLeft' && direction.x === 0) {
        direction = { x: -10, y: 0 };
      } else if (key === 'ArrowRight' && direction.x === 0) {
        direction = { x: 10, y: 0 };
      }
    }

    function restartGame() {
      snake = [{ x: 200, y: 200 }];
      direction = { x: 10, y: 0 };
      food = { x: Math.floor(Math.random() * 40) * 10, y: Math.floor(Math.random() * 40) * 10 };
      score = 0;
      scoreElement.textContent = 'Score: 0';
      gameRunning = true;
      
      // Reset particles and celebration
      particles = [];
      celebrationActive = false;
      
      // Reset performance rank display
      performanceRankElement.style.display = 'none';
    }

    document.addEventListener('keydown', changeDirection);
    restartButton.addEventListener('click', restartGame);

    // Mobile Controls
    function handleMobileControl(dir) {
      if (!gameRunning) return;
      
      if (dir === 'up' && direction.y === 0) {
        direction = { x: 0, y: -10 };
      } else if (dir === 'down' && direction.y === 0) {
        direction = { x: 0, y: 10 };
      } else if (dir === 'left' && direction.x === 0) {
        direction = { x: -10, y: 0 };
      } else if (dir === 'right' && direction.x === 0) {
        direction = { x: 10, y: 0 };
      }
    }

    // Add event listeners to mobile control buttons
    document.querySelectorAll('.control-btn').forEach(button => {
      const dir = button.getAttribute('data-direction');
      
      // Touch events for mobile
      button.addEventListener('touchstart', (e) => {
        e.preventDefault();
        handleMobileControl(dir);
      });
      
      // Mouse events for desktop testing
      button.addEventListener('click', (e) => {
        e.preventDefault();
        handleMobileControl(dir);
      });
    });

    function gameLoop() {
      update();
      draw();
      setTimeout(gameLoop, 150);
    }

    gameLoop();
  </script>
</body>

</html>
